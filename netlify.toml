[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/revalidate-github"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/.netlify/functions/revalidate-github"
  [headers.values]
    Cache-Control = "no-store"
